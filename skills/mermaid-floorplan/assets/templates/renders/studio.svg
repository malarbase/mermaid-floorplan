      stroke: #000;
      stroke-width: 0.05;
    }

    /* Door styling */
    .door {
      fill: #fff;
      stroke: #000;
      stroke-width: 0.05;
    }

    /* Window styling */
    .window {
      fill: #fff;
      stroke: #000;
      stroke-width: 0.01;
    }

    /* Text styling */
    .room-name {
      fill: #000;
      font-family: Arial, sans-serif;
      font-size: 0.8;
    }

    .room-label {
      fill: #000;
      font-family: Arial, sans-serif;
      font-size: 0.8;
    }

    .room-size {
      fill: #666;
